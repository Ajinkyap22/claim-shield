services:
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - extract-file
      - mapping-service
      - validation-service
      - scoring-service
      - policy-service
    environment:
      EXTRACT_FILE_SERVICE_URL: http://extract-file:8080
      MAPPING_SERVICE_URL: http://mapping-service:8002
      VALIDATION_SERVICE_URL: http://validation-service:8003
      SCORING_SERVICE_URL: http://scoring-service:8004
      POLICY_SERVICE_URL: http://policy-service:8005

  mapping-service:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn api:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./apps/data-extraction-pipe:/app
    ports:
      - "8002:8000"
    env_file:
      - apps/data-extraction-pipe/.env

  validation-service:
    image: node:20-slim
    working_dir: /app/apps/validation-service
    command: sh -c "npm install --prefix /app/apps/shared-ts && npm run --prefix /app/apps/shared-ts build && npm install && npm run dev"
    volumes:
      - .:/app
    ports:
      - "8003:8003"
    env_file:
      - apps/validation-service/.env

  scoring-service:
    image: node:20-slim
    working_dir: /app/apps/scoring-service
    command: sh -c "npm install --prefix /app/apps/shared-ts && npm run --prefix /app/apps/shared-ts build && npm install && npm run dev"
    volumes:
      - .:/app
    ports:
      - "8004:8004"
    env_file:
      - apps/scoring-service/.env
    depends_on:
      - policy-service
    environment:
      POLICY_SERVICE_URL: http://policy-service:8005

  policy-service:
    image: node:20-slim
    working_dir: /app/apps/policy-service
    command: sh -c "npm install --prefix /app/apps/shared-ts && npm run --prefix /app/apps/shared-ts build && npm install && npm run dev"
    volumes:
      - .:/app
    ports:
      - "8005:8005"
    env_file: .env

  extract-file:
    build:
      context: .
      dockerfile: apps/extract-file/Dockerfile
    ports:
      - "8080:8080"
    env_file: .env

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - gateway
